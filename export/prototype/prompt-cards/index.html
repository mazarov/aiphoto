    * { box-sizing: border-box; }

    .before-badge-image { aspect-ratio: 1/1; background: #e7edf7; display: flex; align-items: center; justify-content: center; color: #5f6a7c; font-size: 10px; text-align: center; padding: 2px; }
    .before-badge-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .badges { display: flex; flex-wrap: wrap; gap: 6px; }
    .badge { font-size: 11px; border: 1px solid #d0d8e5; color: #364156; background: #f7f9fc; padding: 3px 7px; border-radius: 999px; }
    .badge.warn { border-color: #f1bc87; background: #fff7ef; color: #8b4d10; }
    .warning-reasons { font-size: 12px; color: #7a4a17; background: #fff8f1; border: 1px solid #f3d4b2; border-radius: 8px; padding: 6px 8px; }
    .prompts { background: #f8fafc; border: 1px solid #e3e8f1; border-radius: 8px; padding: 8px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; line-height: 1.35; max-height: 170px; overflow: auto; white-space: pre-wrap; }

ий студийный портрет девочки, используя загруженное фото как точную основу. Черты лица, возраст, выражение, тон кожи, цвет и форма глаз, губ и волос полностью сохранить, без ретуши и изменений. Фон — нежно-розовый, ровный, с мягким студийным светом. На полу несколько пастельно-розовых шариков. Девочка сидит на белом кубе, поза естественная и уверенная, лёгкая улыбка. Наряд — праздничное многослойное пастельное платье с объёмной юбкой и полупрозрачными тканями. На голове ободок. На ногах — прозрачные носочки с мелким декором и белые блестящие туфельки с бантиками. В руках большая декоративная леденцовая палочка ярких пастельных цветов. Атмосфера радостная, тёплая, аккуратная, детская. Стиль реалистичный, мягкие тени, чёткий фокус, естественная текстура кожи."],"promptTextsEn":[],"hashtags":[],"photoCount":1,"promptCount":1,"warnings":[],"previewImagePath":"https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/262/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjYyLzAvMC5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.QPuEzZkNsgbqfwJADPPskPsCAFeAhcuYwGmPh8Gfxqo","previewImagePaths":["https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/262/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjYyLzAvMC5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.QPuEzZkNsgbqfwJADPPskPsCAFeAhcuYwGmPh8Gfxqo"],"previewStorageBuckets":["prompt-images"],"previewStoragePaths":["telegram/lexy_15.02.26/262/0/0.jpg"],"beforeImagePath":null,"beforeAfterEnabled":false},{"id":"30a7d9d0-318d-49ae-8837-bf6aefa28c6a","datasetSlug":"lexy_15.02.26","sourceMessageId":"262","sourceDate":"2025-11-24T16:08:37+00:00","title":"Красивые фото для девочки","promptTextsRu":["Создай студийный портрет девочки, используя загруженное фото как точную основу. Черты лица, возраст, выражени а минималистичной глянцевой съёмки с нотами 60-х, современный люкс, высокая детализация, фотореализм, аккуратная глубина резкости, профессиональная постобработка."],"promptTextsEn":[],"hashtags":[],"photoCount":2,"promptCount":1,"warnings":[],"previewImagePath":"https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/252/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjUyLzAvMC5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.FVktf68D1BNSvuriI8yXTtdeV56ejlLWj7Z3diy1nj8","previewImagePaths":["https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/252/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjUyLzAvMC5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.FVktf68D1BNSvuriI8yXTtdeV56ejlLWj7Z3diy1nj8","https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/252/0/1.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjUyLzAvMS5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.0SeuBXOxZJNEPl8t1eEvoU5ea3vPe7_-nCOcBsXR3FA"],"previewStorageBuckets":["prompt-images","prompt-images"],"previewStoragePaths":["telegram/lexy_15.02.26/252/0/0.jpg","telegram/lexy_15.02.26/252/0/1.jpg"],"beforeImagePath":null,"beforeAfterEnabled":false},{"id":"bb8dd46a-b3fc-49ad-a870-29b3705dd691","datasetSlug":"lexy_15.02.26","sourceMessageId":"250","sourceDate":"2025-11-23T12:31:57+00:00","title":"Мужчина на красном спортивном авто","promptTextsRu":["Используй внешность мужчины 1:1 — лицо, кожа, волосы и пропорции без изменений. Создай динамичную кинематографичную сцену: мужчина сидит на капоте ярко-красного Dodge Challenger SRT с глубокими чёрными акцентами. Камера расположена высоко сверху, подчёркивая мощные линии маслкара и уверенную расслабленную позу. На нём чёрная толстовка, под ней белая футболка, голубые джинсы и чёрно-белые Nike Air Jordan 1 — сочетание городского стиля и лёгкого дерзкого вайба. Асфальтированная дорога под ним отражает тёплый свет золотого часа, создавая мягкие блики на лакированном кузове. Фон слегка размытый, подчёркивает главный акцент — мужчину и автомобиль. Передай атмосферу уверенности, свободы и эстетики современного street-lux: чистые линии, насыщенные цвета, фотореализм 8K, мягкие тени, выразительная композиция сверху. Лицо не менять."],"promptTextsEn":[],"hashtags":[],"photoCount":2,"promptCount":1,"warnings":[],"previewImagePath":"https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/250/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjUwLzAvMC5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.WEl5WyrQt0zGJR_4usR7S096a9020bOiQT_MI9_ANr0","previewImagePaths":["https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/250/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjUwLzAvMC5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.WEl5WyrQt0zGJR_4usR7S096a9020bOiQT_MI9_ANr0","https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/250/0/1.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjUwLzAvMS5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.BcbDgAVgULyTjpkTTWMiBNkY_tBRgIhCTyF7XJ9tEiU"],"previewStorageBuckets":["prompt-images","prompt-images"],"previewStoragePaths":["telegram/lexy_15.02.26/250/0/0.jpg","telegram/lexy_15.02.26/250/0/1.jpg"],"beforeImagePath":null,"beforeAfterEnabled":false},{"id":"376cffe6-5e65-46cc-a793-1835259a30ec","datasetSlug":"lexy_15.02.26","sourceMessageId":"248","sourceDate":"2025-11-23T09:41:25+00:00","title":"С шикарным букетом роз","promptTextsRu":["Используйте внешность пользователя 1:1 — лицо, кожу, волосы и пропорции без изменений.Сверхреалистичное кинематографическое фото, снятое сверху в мягко освещённой роскошной квартире с нейтральными тонами и минималистичным интерьером. В центре — огромный, плотный букет из примерно 2000 бархатистых розовых роз, выходящих за границы кадра. Справа женщина мягко склоняется над цветами, слегка опустив голову в букет; глаза прикрыты, выражение спокойное и тёплое, лицо полностью соответствует референсу. Левая рука элегантно обнимает букет, расслабленная кисть без украшений. На ней тонкие шёлковые бретельки белого платья, передающие сдержанную роскошь. Мягкий кинематографичный фокус, золотистый дневной свет, лёгкие блики на коже и лепестках, атмосфера Vogue — воздушная, интимная, эстетичная. Солнечный луч частично падает на её лицо и плечо, усиливая глубину кадра."],"promptTextsEn":[],"hashtags":[],"photoCount":2,"promptCount":1,"warnings":[],"previewImagePath":"https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/248/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjQ4LzAvMC5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.J6EFgXxu9Hzty8WscIJFUvD8NtfnIFsuipiUWBZacgw","previewImagePaths":["https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/248/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjQ4LzAvMC5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.J6EFgXxu9Hzty8WscIJFUvD8NtfnIFsuipiUWBZacgw","https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/248/0/1.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjQ4LzAvMS5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.Ykh987oKwGNwNLhG90BFTs2g9Rptxmkih-bgPWlNZis"],"previewStorageBuck аклоняется к женщине, мягко касаясь её шеи дыханием, его выражение нежное и тёплое; одной рукой он держит её за пальцы. Женщина чуть улыбается, взгляд спокойный и любящий. Одежда без изменений: мужчина в белой футболке и светлых брюках, женщина в белом топе без рукавов и тёмных джинсах. Свет контрастный, подчёркивает их силуэты внутри светящегося сердца. Детализация высокая, текстуры кожи и ткани реалистичны. Съёмка профессиональная, с малой глубиной резкости, акцент на взгляде и линии профилей. Атмосфера — нежная, кинематографичная, с тонким плёночным зерном и мягким контровым сиянием."],"promptTextsEn":[],"hashtags":[],"photoCount":2,"promptCount":1,"warnings":[],"previewImagePath":"https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/216/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjE2LzAvMC5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.sWdWs3IbLE3kBzJdbcTC2zP1gzMBSCijQSkIxeIOKpk","previewImagePaths":["https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/216/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjE2LzAvMC5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.sWdWs3IbLE3kBzJdbcTC2zP1gzMBSCijQSkIxeIOKpk","https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/216/0/1.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjE2LzAvMS5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.LYymf4q5eV8RpyczSJgmqxIMaBDVX6ct1l7ax5F1a6I"],"previewStorageBuckets":["prompt-images","prompt-images"],"previewStoragePaths":["telegram/lexy_15.02.26/216/0/0.jpg","telegram/lexy_15.02.26/216/0/1.jpg"],"beforeImagePath":null,"beforeAfterEnabled":false},{"id":"a03138ea-14fa-40e9-99af-0df25b832f2f","datasetSlug":"lexy_15.02.26","sourceMessageId":"214","sourceDate":"2025-11-19T14:20:03+00:00","title":"Голливудский портрет","promptTextsRu":["Создай ультрареалистичный гламурный портрет девушки, максимально сохранив её внешность 1:1. Ракурс — со спины: она оборачивается через обнажённое плечо, открывая плавную линию спины. На ней чёрное бархатное платье без бретелей с глубоким V-вырезом на спине и длинные бархатные оперные перчатки. В кадре заметна блестящая деталь — браслет или кристальное украшение. Выражение уверенное, слегка загадочное, с едва заметной мягкой полуулыбкой.Волосы уложены в объёмные голливудские волны: крупные блестящие локоны спадают по спине. На поверхности волос — лёгкое мерцание, будто припудрены тончайшим сияющим шиммером. Макияж вечерний: гладкая подсвеченная кожа, пышные ресницы, аккуратные брови, губы нежного кораллово-розового оттенка.Свет драматичный, контрастный, с мягким контровым сиянием, подчёркивающим структуру локонов. Фон глубокий чёрный, деликатные тени создают кинематографичность. Глубина резкости малая, акцент на глазах и волосах. Стиль — роскошная бьюти-съёмка в духе суперзвёзд 90-х: высокое разрешение, лёгкое плёночное зерно, тёплый тон, бархатные тени и мягкое свечение хайлайта."],"promptTextsEn":[],"hashtags":[],"photoCount":2,"promptCount":1,"warnings":[],"previewImagePath":"https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/214/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjE0LzAvMC5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.wwnz7aFgIWQ8oK1TV9GQivYUDEtPJuK6VtaVIo6tix0","previewImagePaths":["https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/214/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjE0LzAvMC5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.wwnz7aFgIWQ8oK1TV9GQivYUDEtPJuK6VtaVIo6tix0","https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/214/0/1.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMjE0LzAvMS5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.79j9NkhyNhsy7SylgwD1ljrQOHID2bifjYo9ISoD_ow"],"previewStorageBuckets":["prompt-images","prompt-images"],"previewStoragePaths":["telegram/lexy_15.02.26/214/0/0.jpg","telegram/lexy_15.02.26/214/0/1.jpg"],"beforeImagePath":null,"beforeAfterEnabled":false},{"id":"e2e1eee4-1fdf-494e-96d3-92ff07ba4bc6","datasetSlug":"lexy_15.02.26","sourceMessageId":"212","sourceDate":"2025-11-19T10:28:37+00:00","title":"Примеряем на себя макияж smoky eyes и стильную прическу","promptTextsRu":["Используй лицо пользователя 1:1 — черты лица, пропорции. Создай высокодетализированный портрет крупным планом, полностью сохранив её естественные facial-features. Женщина с выразительными тёмными smoky-тенями, графичной чёрной подводкой с негативным пространством и подчёркнутой нижней линией века. Брови аккуратно уложены эффектом ламинирования, губы — глянцевые, телесного оттенка. Волосы собраны в два высоких хвоста, от которых заплетены аккуратные косы; по бокам лица спадают две тонкие пряди-косички. На ней полупрозрачный чёрный сетчатый лонгслив и серебряная серьга-крест. Взгляд прямой, притягательный, направлен в камеру. Мягкий студийный свет подчёркивает текстуру кожи, глубина резкости минимальная; кадр фотореалистичный, профессиональный, с высоким уровнем детализации в стиле современного beauty-editorial. Параметры камеры: 50 мм, f/2.8, ISO 400, лёгкая виньетка, тонкое зерно, холодноватое приглушённое освещение и реалистичная фактура кожи."],"promptTextsEn":[],"hashtags":[],"photoCount":2,"promptCount":1,"warnings":[],"previewImagePath":"https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/212/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMj ости. Улыбка лёгкая, поза уверенная и расслабленная."],"promptTextsEn":[],"hashtags":[],"photoCount":2,"promptCount":1,"warnings":[],"previewImagePath":"https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/177/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMTc3LzAvMC5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.7GSvc2jgzDxt7_opScL5BCmFIvQheLHi2XSCXKMRFBA","previewImagePaths":["https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/177/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMTc3LzAvMC5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.7GSvc2jgzDxt7_opScL5BCmFIvQheLHi2XSCXKMRFBA","https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/177/0/1.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMTc3LzAvMS5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.mdRxvMwD3sOfTfmTQebnsQFVceqVpznAXwm6NrLUlqE"],"previewStorageBuckets":["prompt-images","prompt-images"],"previewStoragePaths":["telegram/lexy_15.02.26/177/0/0.jpg","telegram/lexy_15.02.26/177/0/1.jpg"],"beforeImagePath":null,"beforeAfterEnabled":false},{"id":"13d9e272-fee0-4332-a0e6-148917809d93","datasetSlug":"lexy_15.02.26","sourceMessageId":"175","sourceDate":"2025-11-17T08:58:05+00:00","title":"За чашечкой кофе в уютном кафе","promptTextsRu":["Используй лицо пользователя 1:1 — черты лица, пропорции. Атмосферный editorial/lifestyle-портрет у витрины уютного бистро. Лицо модели остаётся неизменным — естественное, с мягким нюд-макияжем и светлой матовой помадой. Образ многослойный, осенний: свободное верблюжье пальто, под ним коричневый пиджак в мелкую «гусиную лапку» или клетку с золотой пуговицей, поверх — объёмный молочный трикотажный гольф; чёрные прямые брюки, высокие чёрные кожаные сапоги. В руках аккуратная белая фарфоровая чашка, маникюр тёмный, лаконичный. Модель сидит на раттановом стуле, рядом круглый тёмно-зелёный стол с тонким латунным кантом; на поверхности — блюдце с ложкой и коричневый кожаный аксессуар.Фон — отражения интерьера кофейни в стекле витрины.Свет — мягкий дневной, будто после дождя: низкий/средний контраст, спокойные тёпло-нейтральные оттенки."],"promptTextsEn":[],"hashtags":[],"photoCount":2,"promptCount":1,"warnings":[],"previewImagePath":"https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/175/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMTc1LzAvMC5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.HEuBytNaDQSHptSfXchaiZ4uE_5itKvtvp1318xnAK0","previewImagePaths":["https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/175/0/0.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMTc1LzAvMC5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.HEuBytNaDQSHptSfXchaiZ4uE_5itKvtvp1318xnAK0","https://bk07-67ud-ea1y.gw-1a.dockhost.net/storage/v1/object/sign/prompt-images/telegram/lexy_15.02.26/175/0/1.jpg?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1cmwiOiJwcm9tcHQtaW1hZ2VzL3RlbGVncmFtL2xleHlfMTUuMDIuMjYvMTc1LzAvMS5qcGciLCJpYXQiOjE3NzMyMzI2ODcsImV4cCI6MTc3MzMxOTA4N30.87OhOnUxHHrUiHJZK92WzsY8kQrx7JBLzcCw0aAdXl0"],"previewStorageBuckets":["prompt-images","prompt-images"],"previewStoragePaths":["telegram/lexy_15.02.26/175/0/0.jpg","telegram/lexy_15.02.26/175/0/1.jpg"],"beforeImagePath":null,"beforeAfterEnabled":false},{"id":"394e6b8e-38db-4af1-b6f3-077c7fa74f0e","datasetSlug":"lexy_15.02.26","sourceMessageId":"172","sourceDate":"2025-11-16T17:04:00+00:00","title":"Чёрно-белая динамичная серия для мужчины на фоне небоскребов","promptTextsRu":["Используй лицо пользователя. Чёрно-белая динамичная фотосесс     const SUPABASE_URL = "https://bk07-67ud-ea1y.gw-1a.dockhost.net";
    const SUPABASE_WRITE_KEY = "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE2NDE3NjkyMDAsImV4cCI6MjE0NzQ4MzY0OH0.g2XOTiZsxcP-57E5A7NTtiTj2TfweaxLg7Yw0Iy6GOM";

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function warningReason(code) {
      const map = {
        missing_date: "Нет даты у исходного сообщения.",
        missing_ru_prompt_text: "В карточке нет RU промпта (только EN или пусто).",
        ambiguous_prompt_photo_mapping: "Связка промпт-фото может быть неоднозначной.",
        split_mapping_no_explicit_markers: "В исходном тексте нет явной разметки Кадр 1/2/3.",
        split_mapping_remainder_distribution: "Фото и промпты делятся неравномерно (распределен остаток).",
        split_mapping_photo_reuse: "Фото меньше, чем промптов; фото переиспользованы.",
        photo_prompt_count_mismatch: "Количество фото и промптов не совпадает.",
      };
      return map[code] || code;
    }

    function cardMatches(card) {
      const selectedDataset = datasetFilter.value;
      const searchTerm = searchInput.value.trim().toLowerCase();
      if (selectedDataset !== "all" && card.datasetSlug !== selectedDataset) return false;
      if (warningsOnly.checked && (!card.warnings || card.warnings.length === 0)) return false;
      if (searchTerm) {
        const haystack = [card.title, ...(card.promptTextsRu || [])].join("\n").toLowerCase();
        if (!haystack.includes(searchTerm)) return false;
      }
      return true;
    }

    function renderCard(card) {
      const prompts = (card.promptTextsRu && card.promptTextsRu.length > 0)
        ? card.promptTextsRu.join("\n\n")
        : "Нет RU промптов";
      const hashtags = (card.hashtags && card.hashtags.length > 0)
        ? card.hashtags.map((t) => "#" + String(t).replace(/^#/, "")).join(" ")
        : "—";
      const warningBadges = (card.warnings || []).map((w) => '<span class="badge warn">' + esc(w) + "</span>").join("");
      const warningCount = (card.warnings || []).length;
      const warningReasons = warningCount > 0
        ? '<div class="warning-reasons">' + (card.warnings || []).map((w) => '• ' + esc(warningReason(w))).join("<br />") + '</div>'
        : '';

      const preview = card.previewImagePath
        ? '<img src="' + esc(card.previewImagePath) + '" alt="preview" data-card-id="' + esc(card.id) + '" />'
        : '<span>No preview image</span>';

      const thumbs = (card.previewImagePaths && card.previewImagePaths.length > 1)
        ? '<div class="thumbs">' + card.previewImagePaths.map((url, idx) =>
            '<button class="thumb' + (idx === 0 ? ' active' : '') + '" type="button" data-thumb-select="' + esc(card.id) + '" data-thumb-index="' + esc(idx) + '" data-thumb-src="' + esc(url) + '" data-thumb-storage-bucket="' + esc(card.previewStorageBuckets[idx] || "") + '" data-thumb-storage-path="' + esc(card.previewStoragePaths[idx] || "") + '">' +
              '<img src="' + esc(url) + '" alt="thumb ' + esc(idx + 1) + '" />' +
            '</button>'
          ).join("") + '</div>'
        : '';
      const beforeControl = card.previewImagePaths && card.previewImagePaths.length > 0
        ? '<div class="before-control">' +
            '<button type="button" data-set-before="' + esc(card.id) + '">Сделать "Было"</button>' +
            '<span class="before-status" data-before-status="' + esc(card.id) + '"></span>' +
          '</div>'
        : "";

      const beforeBadge = card.beforeAfterEnabled
        ? '<div class="before-badge">' +
            '<div class="before-badge-head">Было</div>' +
            '<div class="before-badge-image">' +
              (card.beforeImagePath ? '<img src="' + esc(card.beforeImagePath) + '" alt="before image" />' : '<span>пусто</span>') +
            '</div>' +
          '</div>'
        : "";

      return '<article class="card">' +
        '<div class="preview">' + preview + beforeBadge + '</div>' +
        '<div class="content">' +
          '<h3 class="title">' + esc(card.title) + '</h3>' +
          '<div class="meta">' + esc(card.datasetSlug) + ' · msg ' + esc(card.sourceMessageId) + (card.sourceDate ? ' · ' + esc(card.sourceDate) : '') + '</div>' +
          '<div class="tech-id">id: ' + esc(card.id) + '</div>' +
          thumbs +
          '<div class="badges">' +
            '<span class="badge">photos: ' + esc(card.photoCount) + '</span>' +
            '<span class="badge">prompts: ' + esc(card.promptCount) + '</span>' +

            warningBadges +

          warningReasons +
          '<div class="prompts">' + esc(prompts) + '</div>' +

          '<div class="actions">' +
            beforeControl +
            '<button type="button" data-copy="' + esc(prompts) + '">Copy RU prompts</button>' +
          '</div>' +
        '</div>' +
      '</article>';
    }

    async function upsertBeforeMedia(cardId, storageBucket, storagePath) {
      const response = await fetch(SUPABASE_URL + "/rest/v1/prompt_card_before_media?on_conflict=card_id", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          apikey: SUPABASE_WRITE_KEY,
          Authorization: "Bearer " + SUPABASE_WRITE_KEY,
          Prefer: "resolution=merge-duplicates,return=representation",
        },
        body: JSON.stringify([
          {
            card_id: cardId,
            storage_bucket: storageBucket,
            storage_path: storagePath,
            source_rule: "prototype_manual_set",
            updated_at: new Date().toISOString(),
          },
        ]),
      });
      if (!response.ok) {
        const body = await response.text();
        throw new Error("Supabase update failed: " + response.status + " " + body);
      }
    }

    function render() {
      const filtered = ALL_CARDS.filter(cardMatches);
      const visible = filtered.slice(0, visibleCount);
      counter.textContent = filtered.length + " cards found";

      if (ALL_CARDS.length === 0) {
        state.style.display = "block";
        state.textContent = "No cards loaded from database.";
        grid.innerHTML = "";
        loadMoreBtn.style.display = "none";
        return;
      }

      if (filtered.length === 0) {
        state.style.display = "block";
        state.textContent = "No cards match current filters.";
        grid.innerHTML = "";
        loadMoreBtn.style.display = "none";
        return;
      }

      state.style.display = "none";
      grid.innerHTML = visible.map(renderCard).join("");
      loadMoreBtn.style.display = filtered.length > visible.length ? "block" : "none";
    }

    function resetAndRender() {
      visibleCount = PAGE_SIZE;
      render();
    }

    function fillDatasetFilter() {
      const datasets = [...new Set(ALL_CARDS.map((c) => c.datasetSlug).filter(Boolean))].sort();

    document.addEventListener("click", async (event) => {

            statusEl.textContent = "Выбери миниатюру";

        const storageBucket = activeThumb.getAttribute("data-thumb-storage-bucket");

          if (statusEl instanceof HTMLElement) {
            statusEl.textContent = "Нет данных для обновления";
            statusEl.classList.remove("ok");

        }
        setBeforeBtn.disabled = true;
        const prevText = setBeforeBtn.textContent;

        if (statusEl instanceof HTMLElement) {
          statusEl.textContent = "";

        try {

              nextPaths.push(card.previewImagePaths[i]);

            card.previewImagePaths = nextPaths;

          if (statusEl instanceof HTMLElement) {
            statusEl.textContent = "Сохранено";

        try {
          await navigator.clipboard.writeText(text);
          target.textContent = "Copied";
          setTimeout(() => { target.textContent = "Copy RU prompts"; }, 1000);
        } catch {
          target.textContent = "Copy failed";
          setTimeout(() => { target.textContent = "Copy RU prompts"; }, 1200);
        }
      }
    });

    datasetFilter.addEventListener("change", resetAndRender);
    searchInput.addEventListener("input", resetAndRender);
    warningsOnly.addEventListener("change", resetAndRender);
    loadMoreBtn.addEventListener("click", () => {
      visibleCount += PAGE_SIZE;
      render();
    });

    fillDatasetFilter();
    render();
  </script>
</body>
</html>
